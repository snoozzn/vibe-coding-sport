
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仪表盘 — VibeSport</title>
  <style>
    :root {
      --bg: oklch(0.96 0.01 160);
      --surface: #ffffff;
      --fg: oklch(0.2 0.02 160);
      --muted: oklch(0.5 0.05 160);
      --border: oklch(0.9 0.02 160);
      --accent: oklch(0.82 0.18 160);
      --accent-on: oklch(0.2 0.02 160);
      
      --font-display: "Inter", -apple-system, system-ui, sans-serif;
      --font-body: "Inter", -apple-system, system-ui, sans-serif;
      --font-mono: ui-monospace, "JetBrains Mono", monospace;
      
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 24px;
      
      --space-1: 4px;
      --space-2: 8px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
      --space-12: 48px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: var(--font-body); 
      background: var(--bg); 
      color: var(--fg); 
      -webkit-font-smoothing: antialiased;
    }

    * { transition: none !important; animation: none !important; }

    .app-container {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }

    /* Sidebar Navigation */
    aside {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: var(--space-8) var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-8);
    }

    .brand {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 20px;
      padding: 0 var(--space-4);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: var(--space-8);
    }
    .brand-dot { width: 12px; height: 12px; background: var(--accent); border-radius: 50%; }

    .nav-group { display: flex; flex-direction: column; gap: 4px; }
    .nav-item {
      display: flex;
      align-items: center;
      padding: 12px var(--space-4);
      text-decoration: none;
      color: var(--fg);
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--radius-sm);
    }
    .nav-item.active { background: var(--accent); color: var(--accent-on); }
    .nav-item:not(.active):hover { background: var(--bg); }

    /* Main Content */
    main {
      padding: var(--space-8) var(--space-8);
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: var(--space-12);
    }

    .welcome-text h1 {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .welcome-text p { color: var(--muted); font-size: 14px; }

    /* Dashboard Grid */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-8);
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-8);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .summary-card .label {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: var(--space-2);
    }
    .summary-card .value {
      font-family: var(--font-mono);
      font-size: 72px;
      font-weight: 800;
      line-height: 1;
    }
    .summary-card .unit { font-size: 24px; color: var(--muted); margin-left: 4px; }

    .quick-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-4);
    }

    .action-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: var(--space-6);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: var(--fg);
      cursor: pointer;
    }
    .action-card:hover { border-color: var(--accent); }
    .action-card .title { font-weight: 700; font-size: 16px; }
    .action-card .icon {
      width: 32px;
      height: 32px;
      background: var(--bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: bold;
      color: var(--accent);
    }

    /* Activity Feed */
    .feed-section {
      margin-top: var(--space-12);
    }
    .feed-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-6);
    }
    .feed-header h2 { font-size: 20px; font-weight: 700; }

    .activity-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }
    .activity-item {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      align-items: center;
      padding: var(--space-4);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .activity-item .date {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
    }
    .activity-item .desc { font-size: 14px; font-weight: 500; }
    .activity-item .val {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 14px;
    }

    @media (max-width: 920px) {
      .app-container { grid-template-columns: 1fr; }
      aside { display: none; }
      .dashboard-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <aside>
      <div class="brand"><div class="brand-dot"></div> VibeSport</div>
      <div class="nav-group">
        <a href="home.html" class="nav-item active">仪表盘</a>
        <a href="stats.html" class="nav-item">数据统计</a>
        <a href="profile.html" class="nav-item">个人设置</a>
      </div>
      <div style="margin-top: auto;">
        <a href="login.html" class="nav-item" style="color: var(--muted)">退出登录</a>
      </div>
    </aside>

    <main>
      <header>
        <div class="welcome-text">
          <h1>你好, Rick</h1>
          <p>今天也是突破自我的一天</p>
        </div>
        <div class="date-pill" style="font-family: var(--font-mono); font-size: 14px; background: var(--surface); border: 1px solid var(--border); padding: 6px 12px; border-radius: var(--radius-sm);">
          2026-07-16
        </div>
      </header>

      <div class="dashboard-grid">
        <div class="summary-card">
          <span class="label">本周总里程</span>
          <div class="value">42.8<span class="unit">km</span></div>
        </div>
        <div class="quick-actions">
          <a href="#" class="action-card">
            <div style="display: flex; align-items: center; gap: 12px;">
              <div class="icon">RN</div>
              <span class="title">记录跑步</span>
            </div>
            <span class="val" style="font-family: var(--font-mono); font-size: 12px; color: var(--muted);">+ KM</span>
          </a>
          <a href="#" class="action-card">
            <div style="display: flex; align-items: center; gap: 12px;">
              <div class="icon">GYM</div>
              <span class="title">健身打卡</span>
            </div>
            <span class="val" style="font-family: var(--font-mono); font-size: 12px; color: var(--muted);">+ MIN</span>
          </a>
          <a href="#" class="action-card">
            <div style="display: flex; align-items: center; gap: 12px;">
              <div class="icon">WGT</div>
              <span class="title">体重录入</span>
            </div>
            <span class="val" style="font-family: var(--font-mono); font-size: 12px; color: var(--muted);">+ KG</span>
          </a>
        </div>
      </div>

      <section class="feed-section">
        <div class="feed-header">
          <h2>最近活动</h2>
          <a href="stats.html" style="font-size: 12px; color: var(--accent); text-decoration: none; font-weight: 600;">查看全部 →</a>
        </div>
        <div class="activity-list">
          <div class="activity-item">
            <span class="date">07-15</span>
            <span class="desc">晨跑 • 城市公园</span>
            <span class="val">5.2 km</span>
          </div>
          <div class="activity-item">
            <span class="date">07-14</span>
            <span class="desc">力量训练 • 上肢日</span>
            <span class="val">45 min</span>
          </div>
          <div class="activity-item">
            <span class="date">07-14</span>
            <span class="desc">体重记录</span>
            <span class="val">74.2 kg</span>
          </div>
          <div class="activity-item">
            <span class="date">07-13</span>
            <span class="desc">瑜伽 • 恢复流</span>
            <span class="val">30 min</span>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
