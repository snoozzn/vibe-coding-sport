<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>体重记录 · VibeSport</title>
  <style>
    :root {
      --bg:      oklch(0.96 0.01 160);
      --surface: #ffffff;
      --fg:      oklch(0.2 0.02 160);
      --muted:   oklch(0.5 0.05 160);
      --border:  oklch(0.9 0.02 160);
      --accent:  oklch(0.82 0.18 160);
      --accent-on: oklch(0.2 0.02 160);
      --danger:  #dc2626;
      --accent-soft: color-mix(in oklch, var(--accent) 20%, transparent);
      --fg-soft:     color-mix(in oklch, var(--fg) 5%, transparent);
      --font-body: 'Inter', -apple-system, system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
      --radius: 10px;
      --radius-lg: 14px;
      --sidebar-w: 248px;
      --topnav-h: 60px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      transition: none !important;
      animation: none !important;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; }
    input, select, textarea { font: inherit; }

    .topnav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      height: var(--topnav-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 24px;
    }
    .topnav .brand { display: flex; align-items: center; gap: 10px; }
    .topnav .brand-dot { width: 12px; height: 12px; background: var(--accent); border-radius: 50%; flex-shrink: 0; }
    .topnav .logo { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
    .topnav-spacer { flex: 1; }
    .topnav .user-pill {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 999px;
      font-size: 13px; font-weight: 500;
    }
    .topnav .user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent-soft);
      display: grid; place-items: center;
      font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--accent);
    }

    .sidebar {
      position: fixed; top: var(--topnav-h); left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 12px; overflow-y: auto; z-index: 10;
    }
    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; }
    .sidebar-nav a {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-radius: var(--radius);
      font-size: 14px; font-weight: 500; color: var(--fg);
      border-left: 3px solid transparent;
    }
    .sidebar-nav a:hover { background: var(--fg-soft); }
    .sidebar-nav a.active { background: var(--accent-soft); color: var(--accent); border-left-color: var(--accent); }
    .sidebar-nav .nav-icon { width: 22px; height: 22px; display: grid; place-items: center; flex-shrink: 0; }
    .sidebar-nav .nav-icon svg { width: 18px; height: 18px; }
    .sidebar-divider { height: 1px; background: var(--border); margin: 12px 14px; }
    .sidebar-section-label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 4px 14px 8px; }

    .main {
      margin-left: var(--sidebar-w);
      margin-top: var(--topnav-h);
      padding: 32px;
      min-height: calc(100vh - var(--topnav-h));
    }

    .page-title { font-size: 22px; font-weight: 700; margin: 0 0 4px; }
    .page-sub { font-size: 13px; color: var(--muted); margin: 0 0 28px; }

    .content-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      align-items: start;
    }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      position: sticky; top: calc(var(--topnav-h) + 24px);
    }
    .form-card h2 { font-size: 16px; font-weight: 600; margin: 0 0 18px; }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label { font-size: 13px; font-weight: 500; color: var(--fg); }
    .input, .textarea {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--fg);
      font-size: 14px;
    }
    .input::placeholder, .textarea::placeholder { color: var(--muted); }
    .input:focus, .textarea:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }
    .textarea { min-height: 72px; resize: vertical; line-height: 1.55; }

    .unit-toggle {
      display: flex; gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .unit-toggle button {
      flex: 1;
      padding: 8px 12px;
      border: 0;
      background: transparent;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
    }
    .unit-toggle button:hover { background: var(--fg-soft); }
    .unit-toggle button.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
      padding: 11px 20px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      font-size: 14px;
      font-weight: 600;
    }
    .btn-primary { background: var(--accent); color: var(--accent-on); border-color: var(--accent); }
    .btn-primary:hover { background: color-mix(in oklch, var(--accent) 85%, black); }
    .btn-ghost {
      background: transparent; color: var(--fg); border-color: var(--border);
      width: auto; padding: 6px 14px; font-size: 13px; font-weight: 500;
    }
    .btn-ghost:hover { background: var(--fg-soft); }
    .btn-ghost.danger { color: var(--danger); border-color: transparent; }
    .btn-ghost.danger:hover { background: color-mix(in oklch, var(--danger) 8%, transparent); }

    /* ─── 体重趋势图（纯 CSS/SVG 折线图） ──────────────────────────── */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
    }
    .chart-card h2 { font-size: 16px; font-weight: 600; margin: 0 0 20px; }
    .chart-area {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      min-height: 240px;
    }
    .chart-area svg { width: 100%; height: 100%; }
    .chart-area .grid-line { stroke: var(--border); stroke-width: 0.5; stroke-dasharray: 4 4; }
    .chart-area .data-line { fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .chart-area .data-area { fill: var(--accent-soft); opacity: 0.5; }
    .chart-area .data-dot { fill: var(--surface); stroke: var(--accent); stroke-width: 2.5; }
    .chart-area .data-dot.highlight { fill: var(--accent); }
    .chart-area .label { font-family: var(--font-mono); font-size: 10px; fill: var(--muted); }
    .chart-area .annot { font-family: var(--font-mono); font-size: 11px; font-weight: 600; }

    .chart-legend { display: flex; gap: 20px; margin-top: 16px; font-size: 12px; color: var(--muted); }
    .chart-legend span { display: flex; align-items: center; gap: 6px; }
    .chart-legend .dot { width: 8px; height: 8px; border-radius: 50%; }
    .chart-legend .dot.accent { background: var(--accent); }

    /* ─── 体重列表 ──────────────────────────────────────────────────── */
    .list-header { display: flex; align-items: center; justify-content: space-between; margin: 24px 0 12px; }
    .list-header h2 { font-size: 16px; font-weight: 600; margin: 0; }
    .list-header .count { font-family: var(--font-mono); font-size: 13px; color: var(--muted); }

    .wt-list { display: flex; flex-direction: column; }
    .wt-item {
      display: grid; grid-template-columns: 90px 1fr 120px 80px;
      align-items: center; gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 8px;
    }
    .wt-date { font-family: var(--font-mono); font-size: 13px; color: var(--muted); }
    .wt-info h3 { font-size: 14px; font-weight: 600; margin: 0 0 2px; }
    .wt-info p { font-size: 12px; color: var(--muted); margin: 0; }
    .wt-val {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 700;
      text-align: right;
    }
    .wt-change {
      font-family: var(--font-mono);
      font-size: 11px;
      display: inline-block;
      padding: 2px 6px;
      border-radius: 999px;
    }
    .wt-change.down { background: var(--accent-soft); color: var(--accent); }
    .wt-change.up { background: color-mix(in oklch, var(--danger) 10%, transparent); color: var(--danger); }
    .wt-actions { display: flex; gap: 4px; justify-content: flex-end; }

    @media (max-width: 920px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 24px 16px; }
      .content-grid { grid-template-columns: 1fr; }
      .form-card { position: static; }
      .wt-item { grid-template-columns: 70px 1fr 80px; }
      .wt-actions { display: none; }
    }
  </style>
</head>
<body>
  <header class="topnav" data-od-id="topnav">
    <span class="brand">
      <span class="brand-dot" aria-hidden="true"></span>
      <span class="logo">VibeSport</span>
    </span>
    <span class="topnav-spacer"></span>
    <a href="profile.html" class="user-pill">
      <span class="user-avatar">AJ</span>
      <span>跑者阿杰</span>
    </a>
  </header>

  <aside class="sidebar" data-od-id="sidebar">
    <div class="sidebar-section-label">主要</div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>仪表盘</a>
      <a href="running.html"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="2"/><path d="M7 21l1.5-5 3.5 1 4-6 3 2"/></svg></span>跑步记录</a>
      <a href="fitness.html"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M6 8h4l2-4 2 4h4M8 8v8M16 8v8M10 12h4"/></svg></span>健身记录</a>
      <a href="weight.html" class="active"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 3a4 4 0 014 4v2h4v10a2 2 0 01-2 2H6a2 2 0 01-2-2V9h4V7a4 4 0 014-4z"/></svg></span>体重记录</a>
    </nav>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section-label">分析</div>
    <nav class="sidebar-nav">
      <a href="analytics.html"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>统计分析</a>
    </nav>
    <div class="sidebar-divider"></div>
    <nav class="sidebar-nav">
      <a href="profile.html"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0116 0"/></svg></span>个人中心</a>
      <a href="login.html" style="color: var(--muted);"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg></span>退出登录</a>
    </nav>
  </aside>

  <main class="main" data-od-id="weight-content">
    <h1 class="page-title">体重记录</h1>
    <p class="page-sub">追踪体重变化趋势 · 朝目标体重前进</p>

    <div class="content-grid">
      <!-- 录入表单 -->
      <div class="form-card" data-od-id="weight-form">
        <h2>新增体重记录</h2>
        <form>
          <div class="field">
            <label for="weight">体重数值</label>
            <input id="weight" type="number" class="input" placeholder="例：68.5" min="20" max="500" step="0.1" required />
          </div>
          <div class="field">
            <label>单位</label>
            <div class="unit-toggle">
              <button type="button" class="active">kg</button>
              <button type="button">lbs</button>
            </div>
          </div>
          <div class="field">
            <label for="date">记录日期</label>
            <input id="date" type="date" class="input" value="2026-07-17" required />
          </div>
          <div class="field">
            <label for="notes">备注（可选）</label>
            <textarea id="notes" class="textarea" placeholder="如：晨起空腹、饭后……"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">记录体重</button>
        </form>
      </div>

      <!-- 趋势图 -->
      <div class="chart-card" data-od-id="weight-chart">
        <h2>近 30 天体重变化</h2>
        <div class="chart-area">
          <svg viewBox="0 0 600 300" preserveAspectRatio="xMidYMid meet">
            <!-- 网格线 -->
            <line class="grid-line" x1="50" y1="40" x2="580" y2="40"/>
            <line class="grid-line" x1="50" y1="90" x2="580" y2="90"/>
            <line class="grid-line" x1="50" y1="140" x2="580" y2="140"/>
            <line class="grid-line" x1="50" y1="190" x2="580" y2="190"/>
            <line class="grid-line" x1="50" y1="240" x2="580" y2="240"/>

            <!-- Y轴标签 -->
            <text class="label" x="42" y="44" text-anchor="end">71</text>
            <text class="label" x="42" y="94" text-anchor="end">70</text>
            <text class="label" x="42" y="144" text-anchor="end">69</text>
            <text class="label" x="42" y="194" text-anchor="end">68</text>
            <text class="label" x="42" y="244" text-anchor="end">67</text>

            <!-- 折线下方填充区域 -->
            <polygon class="data-area" points="
              72,210 190,195 308,185 426,178 544,165 580,160
              580,260 72,260
            "/>

            <!-- 折线 -->
            <polyline class="data-line" points="
              72,210 190,195 308,185 426,178 544,165 580,160
            "/>

            <!-- 数据点 -->
            <circle class="data-dot" cx="72" cy="210" r="4.5"/>
            <circle class="data-dot" cx="190" cy="195" r="4.5"/>
            <circle class="data-dot" cx="308" cy="185" r="4.5"/>
            <circle class="data-dot" cx="426" cy="178" r="4.5"/>
            <circle class="data-dot" cx="544" cy="165" r="4.5"/>
            <circle class="data-dot highlight" cx="580" cy="160" r="5"/>

            <!-- X轴标签 -->
            <text class="label" x="72" y="272" text-anchor="middle">6/18</text>
            <text class="label" x="190" y="272" text-anchor="middle">6/23</text>
            <text class="label" x="308" y="272" text-anchor="middle">6/28</text>
            <text class="label" x="426" y="272" text-anchor="middle">7/3</text>
            <text class="label" x="544" y="272" text-anchor="middle">7/10</text>
            <text class="label" x="580" y="272" text-anchor="middle">7/17</text>

            <!-- 最高/最低标注 -->
            <text class="annot" fill="var(--accent)" x="72" y="198">最高 70.2</text>
            <text class="annot" fill="var(--accent)" x="580" y="148">最低 68.0</text>
          </svg>
        </div>
        <div class="chart-legend">
          <span><span class="dot accent"></span> 体重 (kg)</span>
          <span>目标体重 · 65.0 kg</span>
        </div>
      </div>
    </div>

    <!-- 历史列表 -->
    <div data-od-id="weight-history">
      <div class="list-header">
        <h2>历史记录</h2>
        <span class="count">共 34 条</span>
      </div>
      <div class="wt-list">
        <div class="wt-item">
          <span class="wt-date">7月17日</span>
          <div class="wt-info">
            <h3>晨起空腹</h3>
            <p>排便后称重</p>
          </div>
          <div class="wt-val">68.5 kg <span class="wt-change down">-0.3</span></div>
          <div class="wt-actions">
            <button class="btn-ghost">编辑</button>
            <button class="btn-ghost danger">删除</button>
          </div>
        </div>
        <div class="wt-item">
          <span class="wt-date">7月16日</span>
          <div class="wt-info">
            <h3>晨起空腹</h3>
            <p></p>
          </div>
          <div class="wt-val">68.8 kg <span class="wt-change down">-0.2</span></div>
          <div class="wt-actions">
            <button class="btn-ghost">编辑</button>
            <button class="btn-ghost danger">删除</button>
          </div>
        </div>
        <div class="wt-item">
          <span class="wt-date">7月15日</span>
          <div class="wt-info">
            <h3>晨起空腹</h3>
            <p>昨晚吃多了</p>
          </div>
          <div class="wt-val">69.0 kg <span class="wt-change up">+0.3</span></div>
          <div class="wt-actions">
            <button class="btn-ghost">编辑</button>
            <button class="btn-ghost danger">删除</button>
          </div>
        </div>
        <div class="wt-item">
          <span class="wt-date">7月14日</span>
          <div class="wt-info">
            <h3>晨起空腹</h3>
            <p></p>
          </div>
          <div class="wt-val">68.7 kg <span class="wt-change down">-0.5</span></div>
          <div class="wt-actions">
            <button class="btn-ghost">编辑</button>
            <button class="btn-ghost danger">删除</button>
          </div>
        </div>
        <div class="wt-item">
          <span class="wt-date">7月13日</span>
          <div class="wt-info">
            <h3>晨起空腹</h3>
            <p>运动后称重</p>
          </div>
          <div class="wt-val">69.2 kg <span class="wt-change down">-0.1</span></div>
          <div class="wt-actions">
            <button class="btn-ghost">编辑</button>
            <button class="btn-ghost danger">删除</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
