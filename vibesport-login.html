
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — VibeSport</title>
  <style>
    :root {
      --bg: oklch(0.96 0.01 160);
      --surface: #ffffff;
      --fg: oklch(0.2 0.02 160);
      --muted: oklch(0.5 0.05 160);
      --border: oklch(0.9 0.02 160);
      --accent: oklch(0.82 0.18 160);
      --accent-on: oklch(0.2 0.02 160);
      
      --font-display: "Inter", -apple-system, system-ui, sans-serif;
      --font-body: "Inter", -apple-system, system-ui, sans-serif;
      --font-mono: ui-monospace, "JetBrains Mono", monospace;
      
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      
      --space-2: 8px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
      --space-12: 48px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: var(--font-body); 
      background: var(--bg); 
      color: var(--fg); 
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    * { transition: none !important; animation: none !important; }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: var(--space-8);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 400px;
      margin: var(--space-6);
    }

    .header {
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .brand {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 24px;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: var(--space-4);
    }

    .brand-dot {
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
    }

    .field {
      margin-bottom: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      border: 1px solid transparent;
      margin-top: var(--space-8);
    }
    .btn-primary { background: var(--accent); color: var(--accent-on); }

    .footer {
      margin-top: var(--space-8);
      text-align: center;
      font-size: 14px;
      color: var(--muted);
    }

    .footer a {
      color: var(--fg);
      text-decoration: none;
      font-weight: 600;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="header">
      <div class="brand"><div class="brand-dot"></div> VibeSport</div>
      <p class="subtitle">欢迎回来，继续你的突破之旅</p>
    </div>

    <form action="home.html">
      <div class="field">
        <label for="username">用户名 / 邮箱</label>
        <input type="text" id="username" placeholder="输入您的账户信息" required>
      </div>
      <div class="field">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary">登录账户</button>
    </form>

    <div class="footer">
      还没有账户？<a href="#">立即注册</a>
    </div>
  </div>
</body>
</html>
